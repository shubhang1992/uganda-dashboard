<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#F6F7FB" />
<title>You're offline · Universal Pensions</title>
<style>
  :root{ --indigo:#292867; --indigo-soft:#5E63A8; --lavender:#D9DCF2; --cloud:#F6F7FB; --gray:#646A80; --slate:#2F3550; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans','Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:var(--cloud);color:var(--slate);min-height:100vh;min-height:100dvh;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .card{max-width:340px;text-align:center}
  .mark{width:64px;height:64px;margin:0 auto 22px;border-radius:18px;background:var(--indigo);
    display:flex;align-items:center;justify-content:center;box-shadow:0 12px 30px -12px rgba(41,40,103,.55)}
  h1{font-size:20px;font-weight:800;letter-spacing:-.02em;color:var(--indigo);margin-bottom:10px}
  p{font-size:14px;line-height:1.6;color:var(--gray)}
  button{margin-top:24px;font:inherit;font-weight:700;font-size:14px;color:#fff;background:var(--indigo);
    border:none;border-radius:12px;padding:13px 22px;cursor:pointer}
  button:active{background:var(--indigo-soft)}
</style>
</head>
<body>
  <div class="card">
    <div class="mark">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M16 12h.01"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Universal Pensions needs a connection to show your balance and savings. Reconnect and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
