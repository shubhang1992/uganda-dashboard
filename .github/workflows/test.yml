# CI for the Universal Pensions Uganda demo platform.
#
# Runs on PRs targeting `main` and on pushes to `main`. Two jobs:
#   1. lint-and-unit  → fast feedback (ESLint + vitest, ~30s).
#   2. e2e            → Playwright smoke + flow specs (~3 min). Gated on
#                       lint-and-unit so we don't burn browser time on a broken
#                       PR.
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   • VITE_SUPABASE_URL          — public Supabase project URL
#   • VITE_SUPABASE_ANON_KEY     — public anon key
#   • SUPABASE_SERVICE_ROLE_KEY  — server-only key for DB verification fixtures
#   • SUPABASE_JWT_SECRET        — HS256 secret for minting test JWTs
#
# Note: VERCEL_PROJECT_ID / VERCEL_ORG_ID are intentionally NOT used here.
# Frontend auto-deploys to Vercel are driven by the Vercel GitHub App (push to
# main, not GHA), so dropping these secrets does NOT break the deploy pipeline.
# Backend deploys to Render via Render's own GitHub integration / Deploy Hook.
#
# Note on shared DB: e2e flow specs write to the shared Supabase project
# (ilkhfnoyxlxwqadebnkp) and clean up in `afterEach`. We run with --workers=1
# below so concurrent runs in the same job don't race on the same rows; the
# `concurrency` block at workflow level cancels in-flight runs on the same ref
# so a follow-up push pre-empts the previous one.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Force JavaScript-based actions to use Node 24 (Node 20 is deprecated from
# 2026-09-16; runners force Node 24 by default from 2026-06-02). Opting in
# now keeps behaviour stable across the transition window.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-unit:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Unit tests
        # --coverage so Phase-6 F3 can enforce a coverage threshold on CI.
        run: npm test -- --coverage

      - name: Build (Vite frontend)
        # Gates the Vite frontend build (~5s) so a bad import / Vite-incompatible
        # syntax fails the PR here rather than surfacing only at Vercel deploy
        # post-merge. CI otherwise runs only build:api (the e2e job). (F-G17)
        run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: lint-and-unit
    timeout-minutes: 20
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_USE_SUPABASE: 'true'
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      # Vite reads this at dev-server boot; Playwright's webServer block
      # (npm run dev:all) starts both Vite :5173 and Express :3001 in
      # parallel, so the frontend must point at the local Express, not
      # the production Render URL.
      VITE_API_BASE_URL: 'http://localhost:3001/api'
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type-check server build
        # Catches NodeNext import drift (e.g. missing `.js` extensions) at PR
        # review time rather than at Render deploy time. ~15s — cheap insurance.
        # tsc -p server/tsconfig.json walks every TS file under api/ and server/,
        # so missing extensions or @vercel/node type breaks fail loudly here.
        run: npm run build:api

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers + system deps
        # On PRs we run the chromium + mobile-chromium projects only — fast
        # feedback. On pushes to `main` we run the full Chromium + WebKit
        # matrix (smoke + flow + regression + db). The install step covers
        # both so a single cache key serves both jobs.
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright smoke + flow + db specs (PR — chromium + mobile-chromium)
        if: github.event_name == 'pull_request'
        # PR feedback path: smoke covers every dashboard route per role,
        # flow specs exercise the write+DB chain. We also gate the db/ guards
        # (cross-tenant RLS isolation, money RPC idempotency, schema invariants)
        # on PRs — they are service-role-only (~7 fast queries, no UI/browser,
        # so they add only seconds) and catch security/money regressions before
        # merge rather than only post-merge on main (§15-H1). Two projects only
        # so we stay under the 5-min-per-combo SLA from §6.H of the audit plan.
        run: |
          npx playwright test e2e/specs/smoke e2e/specs/flows e2e/specs/db \
            --project=chromium --project=mobile-chromium \
            --workers=1

      - name: Run Playwright full matrix (main post-merge — chromium + webkit, smoke + flow + regression + db)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Full matrix: every project × every spec. The DB invariants run
        # against the live `ilkhfnoyxlxwqadebnkp` project (service-role
        # query), so this also guarantees the schema state is intact after
        # each merge to main.
        run: |
          npx playwright test --workers=1

      - name: Assert db/ specs actually executed (not silently skipped) (§15-M1)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Guard against silent hollowing-out: every test in e2e/specs/db/ is
        # wrapped in `test.skip(!hasEnv, …)`, so a MISSING secret turns the whole
        # db/ guard suite into all-skipped — which still reports GREEN and would
        # let a cross-tenant RLS / money-idempotency regression sail through on
        # main. Re-run just the db/ specs with the JSON reporter and fail the job
        # if zero tests EXECUTED (stats.expected === 0 ⇒ everything was skipped or
        # nothing was discovered). A real db-test failure already fails the full
        # matrix above; this step specifically catches the "0 ran" case.
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: db-results.json
        run: |
          npx playwright test e2e/specs/db \
            --project=chromium \
            --workers=1 \
            --reporter=json
          node -e '
            const fs = require("fs");
            const file = process.env.PLAYWRIGHT_JSON_OUTPUT_NAME;
            const report = JSON.parse(fs.readFileSync(file, "utf8"));
            const { expected = 0, skipped = 0, unexpected = 0, flaky = 0 } = report.stats || {};
            console.log(`db/ specs — expected(ran+passed): ${expected}, skipped: ${skipped}, unexpected: ${unexpected}, flaky: ${flaky}`);
            if (expected < 1) {
              console.error(
                "§15-M1 FAILURE: 0 db/ specs executed (all skipped or none discovered). " +
                "This usually means a required secret (SUPABASE_SERVICE_ROLE_KEY / " +
                "VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY / SUPABASE_JWT_SECRET) is " +
                "missing, so the RLS / money-idempotency / invariant guards did NOT run."
              );
              process.exit(1);
            }
          '

      - name: Upload Playwright HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright traces + screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
