# Wake-pinger for the Render free-tier backend (audit B7).
#
# GitHub Actions' cron has 5–15 min real-world jitter; running every 10 min
# widens the margin against Render's 15-min spin-down so two jittered fires
# stay <15 min apart. cron-job.org or UptimeRobot is configured separately as
# a 5-min backup. Both should be set to email the team on failure (audit G59).

name: Render keepalive

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /healthz
        run: |
          set -euo pipefail
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 \
            "https://uganda-dashboard-api.onrender.com/healthz")
          if [ "$code" != "200" ]; then
            echo "Render /healthz returned HTTP $code"
            exit 1
          fi
          echo "Render /healthz ok"
