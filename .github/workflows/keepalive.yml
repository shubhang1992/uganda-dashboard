# Wake-pinger for the Render free-tier backend (audit B7).
#
# GitHub Actions' cron has 5–15 min real-world jitter; running every 14 min
# gives a ~750 instance-hour/mo footprint (audit N27 — under the free cap).
# cron-job.org or UptimeRobot is configured separately as a 5-min backup.
# Both should be set to email the team on failure (audit G59).
#
# NOTE: the hostname below is a placeholder derived from `name:` in render.yaml.
# Render generates URLs as `<name>.onrender.com` but may append a hash suffix
# if the name is taken. Update this URL in a follow-up commit once the actual
# service hostname is confirmed in the Render dashboard.

name: Render keepalive

on:
  schedule:
    - cron: '*/14 * * * *'   # every 14 min
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /healthz
        run: |
          set -euo pipefail
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 \
            "https://uganda-dashboard-api.onrender.com/healthz")
          if [ "$code" != "200" ]; then
            echo "Render /healthz returned HTTP $code"
            exit 1
          fi
          echo "Render /healthz ok"
